[options]
; Master password for the database manager screen — change this before any real deploy.
admin_passwd = admin

; Our three custom modules are mounted here; Odoo loads its own core addons automatically.
addons_path = /mnt/extra-addons

; Keep the database list reachable so you can create the DB from the browser.
list_db = True

; Sensible defaults for a small demo instance.
limit_time_cpu = 600
limit_time_real = 1200
