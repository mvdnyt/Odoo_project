# Dubai Tourism ERP — one-command Odoo 19 stack.
#
#   docker compose up -d      # then open http://localhost:8069
#
# Both custom modules are mounted read-only from this repo, so editing the code
# is reflected after an Odoo restart / module upgrade.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:19
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-data:/var/lib/odoo
      - ./deploy/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./dubai_tourism:/mnt/extra-addons/dubai_tourism:ro
      - ./tourism_accounts:/mnt/extra-addons/tourism_accounts:ro
    restart: unless-stopped

volumes:
  odoo-db:
  odoo-data:
