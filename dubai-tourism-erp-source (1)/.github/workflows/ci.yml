name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  static-checks:
    name: Static checks (compile + XML + manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all Python
        run: python -m compileall -q dubai_tourism tourism_accounts
      - name: Validate every XML file is well-formed
        run: |
          python - <<'PY'
          import glob, sys, xml.etree.ElementTree as ET
          ok = True
          for path in glob.glob("**/*.xml", recursive=True):
              try:
                  ET.parse(path)
              except ET.ParseError as exc:
                  print(f"::error file={path}::{exc}"); ok = False
          print("XML OK" if ok else "XML errors found")
          sys.exit(0 if ok else 1)
          PY
      - name: Validate module manifests
        run: |
          python - <<'PY'
          import ast, glob
          for path in glob.glob("**/__manifest__.py", recursive=True):
              m = ast.literal_eval(open(path).read())
              assert {"name", "depends", "data"} <= m.keys(), path
              print("OK", path, "->", m["name"])
          PY
